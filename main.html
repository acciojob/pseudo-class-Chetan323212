<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            margin: 20px;
        }

        div::before {
            content: "Before Element";
            color: rgb(255, 0, 0);
            font-size: 20px;
        }

        div::after {
            content: "After Element";
            color: rgb(255, 0, 0);
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="container">This is the main container element</div>
</body>
</html>
